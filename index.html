<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مفاجأة برمجية خاصة 💖</title>
    <style>
        * {
            box-sizing: border-box;
        }
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #050505;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
            -webkit-user-select: none;
        }
        #canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }
        /* واجهة الدخول الأولى والمجهزة لـ Vercel والهواتف */
        #overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, #1a0515 0%, #050505 100%);
            z-index: 10;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            transition: opacity 1.5s ease-in-out, visibility 1.5s;
        }
        .start-btn {
            padding: 20px 70px;
            font-size: 32px;
            font-weight: bold;
            color: #fff;
            background: linear-gradient(45deg, #ff4bb4, #ff2a6d);
            border: none;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 0 35px rgba(255, 42, 109, 0.8);
            transition: transform 0.3s, box-shadow 0.3s, background 0.5s;
            outline: none;
            z-index: 11;
            letter-spacing: 2px;
        }
        .start-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 0 60px rgba(255, 42, 109, 1);
        }
        .start-btn:active {
            transform: scale(0.95);
        }
        /* رسالة منبثقة عند وجود مشكلة في تحميل الصوت */
        #audio-error {
            position: absolute;
            bottom: 20px;
            background: rgba(255, 42, 109, 0.2);
            border: 1px solid #ff2a6d;
            color: #ffb3d1;
            padding: 10px 20px;
            border-radius: 10px;
            font-size: 13px;
            display: none;
            z-index: 12;
            text-align: center;
            max-width: 90%;
        }
        /* تصميم أنيق وفاخر لحرف R في منتصف القلب */
        #letter-r {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.7);
            font-family: 'Playfair Display', 'Didot', 'Bodoni MT', 'Baskerville', 'Georgia', serif;
            font-size: 130px;
            font-weight: 300;
            /* تدرج لوني معدني فاخر باللون الأبيض والوردي الفاتح */
            background: linear-gradient(135deg, #ffffff 30%, #ffd3e2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            /* توهج ناعم متعدد الطبقات باللون الوردي */
            filter: drop-shadow(0 0 15px rgba(255, 42, 109, 0.6)) drop-shadow(0 0 30px rgba(255, 75, 180, 0.4));
            opacity: 0;
            z-index: 2;
            pointer-events: none;
            margin: 0;
            line-height: 1;
            transition: opacity 3s ease-in-out, transform 3s cubic-bezier(0.1, 0.8, 0.2, 1);
        }
        /* حركة تموج وعوم بطيئة وهادئة تعطي طابعاً حيوياً فخماً */
        @keyframes elegantFloat {
            0% { 
                transform: translate(-50%, -50%) scale(1); 
                filter: drop-shadow(0 0 15px rgba(255, 42, 109, 0.6)) drop-shadow(0 0 30px rgba(255, 75, 180, 0.4));
            }
            50% { 
                transform: translate(-50%, -50%) scale(1.06); 
                filter: drop-shadow(0 0 25px rgba(255, 42, 109, 0.9)) drop-shadow(0 0 45px rgba(255, 75, 180, 0.7));
            }
            100% { 
                transform: translate(-50%, -50%) scale(1); 
                filter: drop-shadow(0 0 15px rgba(255, 42, 109, 0.6)) drop-shadow(0 0 30px rgba(255, 75, 180, 0.4));
            }
        }
        .elegant-float {
            animation: elegantFloat 4.5s infinite ease-in-out;
        }
    </style>
</head>
<body>

    <!-- شاشة البداية للتفاعل لتشغيل الصوت دون قيود المتصفح -->
    <div id="overlay">
        <button class="start-btn" onclick="startExperience()">اضغطي 💖</button>
        <div id="audio-error">جاري تحميل الصوت... برجاء الانتظار ثوانٍ إذا لم يعمل فوراً.</div>
    </div>

    <!-- حرف R في وسط القلب تماماً -->
    <h1 id="letter-r">R</h1>

    <!-- لوحة الرسم ثنائية الأبعاد -->
    <canvas id="canvas"></canvas>
    
    <!-- صوت الخلفية من الرابط الخاص بك مجهز للعمل عبر تقنية CORS -->
    <audio id="bg-music" crossorigin="anonymous" loop>
        <source src="https://pdftolink.io/file/r2_dXNlcnMvZ3Vlc3QvYjQ4MjhiM2EtZDg1Yi00N2M5LWI3OWItZDA0OTEyZTRlMGRkLm1wMw" type="audio/mpeg">
        <source src="https://pdftolink.io/file/r2_dXNlcnMvZ3Vlc3QvYjQ4MjhiM2EtZDg1Yi00N2M5LWI3OWItZDA0OTEyZTRlMGRkLm1wMw" type="audio/mp3">
    </audio>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const audio = document.getElementById('bg-music');
        const overlay = document.getElementById('overlay');
        const letterR = document.getElementById('letter-r');
        const errorMsg = document.getElementById('audio-error');

        let animationStarted = false;
        let currentStep = 0;
        const maxSteps = 600;
        let points = [];

        // تعديل الأبعاد لتناسب الشاشات المختلفة بشكل متجاوب
        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            if (animationStarted && currentStep >= maxSteps) {
                drawFullHeart();
            }
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // محاولة تهيئة وتثبيت تشغيل الصوت بشكل قوي يتخطى قيود المتصفحات والأجهزة الذكية
        function forcePlayAudio() {
            const playPromise = audio.play();
            
            if (playPromise !== undefined) {
                playPromise.then(() => {
                    console.log("تم تشغيل الصوت بنجاح!");
                }).catch(error => {
                    console.log("المتصفح يقيد التشغيل التلقائي، جاري المحاولة بطريقة بديلة:", error);
                    errorMsg.style.display = 'block';
                    
                    const retryPlay = () => {
                        audio.play().then(() => {
                            errorMsg.style.display = 'none';
                            document.removeEventListener('touchstart', retryPlay);
                            document.removeEventListener('click', retryPlay);
                        });
                    };
                    document.addEventListener('touchstart', retryPlay);
                    document.addEventListener('click', retryPlay);
                });
            }
        }

        // بدء التجربة عند ضغط الزر
        function startExperience() {
            overlay.style.opacity = '0';
            setTimeout(() => {
                overlay.style.visibility = 'hidden';
            }, 1500);

            forcePlayAudio();

            animationStarted = true;
            animateHeart();
        }

        // حساب نقاط القلب بناءً على معادلات الرسم الرياضية للبايثون
        function getHeartPoint(step) {
            let t = step / 20;
            let x = 16 * Math.pow(Math.sin(t), 3);
            let y = 13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t);
            
            let scale = Math.min(canvas.width, canvas.height) / 45;
            
            let cx = canvas.width / 2 + x * scale;
            let cy = canvas.height / 2 - y * scale;
            
            return { x: cx, y: cy };
        }

        // رسم القلب خطوة بخطوة بسرعة منخفضة ومنتظمة جداً
        function animateHeart() {
            if (!animationStarted) return;

            // نقوم برسم نقطة واحدة فقط في كل إطار لجعل عملية الرسم بطيئة وحالمة
            if (currentStep >= maxSteps) {
                showInsideContent();
                startFloatingParticles(); 
                return;
            }

            let p = getHeartPoint(currentStep);
            points.push(p);

            ctx.fillStyle = "hotpink";
            ctx.font = "bold 9px Arial";
            ctx.textAlign = "center";
            ctx.shadowBlur = 5;
            ctx.shadowColor = "hotpink";
            ctx.fillText("I love you", p.x, p.y);

            currentStep++;

            requestAnimationFrame(animateHeart);
        }

        // إعادة رسم القلب بالكامل بشكل ثابت ومستقر
        function drawFullHeart() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "hotpink";
            ctx.font = "bold 9px Arial";
            ctx.textAlign = "center";
            ctx.shadowBlur = 5;
            ctx.shadowColor = "hotpink";
            
            for (let i = 0; i < currentStep; i++) {
                let p = getHeartPoint(i);
                ctx.fillText("I love you", p.x, p.y);
            }
        }

        // إظهار الحرف "R" الفاخر في منتصف القلب بعد انتهاء الرسم
        function showInsideContent() {
            letterR.style.opacity = '1';
            letterR.style.transform = 'translate(-50%, -50%) scale(1)';
            
            // تفعيل حركة العوم البطيئة والراقية بعد انتهاء تأثير الظهور
            setTimeout(() => {
                letterR.classList.add('elegant-float');
            }, 3000);
        }

        // إضافة جزيئات دقيقة متلألئة وعائمة خلف القلب
        let particles = [];
        function startFloatingParticles() {
            setInterval(() => {
                if (particles.length < 60) {
                    particles.push({
                        x: canvas.width / 2 + (Math.random() - 0.5) * 150,
                        y: canvas.height / 2 + (Math.random() - 0.5) * 150,
                        size: Math.random() * 3 + 1,
                        speedX: (Math.random() - 0.5) * 1.2,
                        speedY: -Math.random() * 1.2 - 0.2,
                        alpha: 1
                    });
                }
            }, 180);
            
            function updateParticles() {
                drawFullHeart();
                
                for (let i = 0; i < particles.length; i++) {
                    let p = particles[i];
                    p.x += p.speedX;
                    p.y += p.speedY;
                    p.alpha -= 0.003;
                    
                    if (p.alpha <= 0) {
                        particles.splice(i, 1);
                        i--;
                        continue;
                    }
                    
                    ctx.save();
                    ctx.globalAlpha = p.alpha;
                    ctx.fillStyle = "#ff4bb4";
                    ctx.shadowBlur = 8;
                    ctx.shadowColor = "#ff2a6d";
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                    ctx.fill();
                    ctx.restore();
                }
                requestAnimationFrame(updateParticles);
            }
            updateParticles();
        }
    </script>
</body>
</html>
